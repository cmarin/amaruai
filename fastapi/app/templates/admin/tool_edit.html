<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Tool</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], select { width: 100%; padding: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Edit Tool</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/admin/tools/{{ tool.id }}/edit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ tool.name }}" required>
        
        <label for="personas">Associated Personas:</label>
        <select id="personas" name="persona_ids" multiple required>
            {% for persona in personas %}
            <option value="{{ persona.id }}" {% if persona in tool.personas %}selected{% endif %}>{{ persona.role }}</option>
            {% endfor %}
        </select>
        
        <input type="submit" value="Update Tool">
    </form>
    <a href="/admin/tools/{{ tool.id }}">Back to Tool Detail</a>
    <br>
    <a href="/admin/">Back to Dashboard</a>
</body>
</html>
