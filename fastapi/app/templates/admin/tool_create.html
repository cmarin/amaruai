<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Tool</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], select { width: 100%; padding: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Create Tool</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/admin/tools/create" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        
        <label for="persona">Associated Persona:</label>
        <select id="persona" name="persona_id" required>
            {% for persona in personas %}
            <option value="{{ persona.id }}">{{ persona.role }}</option>
            {% endfor %}
        </select>
        
        <input type="submit" value="Create Tool">
    </form>
    <a href="/admin/">Back to Dashboard</a>
</body>
</html>
