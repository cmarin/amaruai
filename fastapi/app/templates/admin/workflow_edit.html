<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Workflow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], textarea, select { width: 100%; padding: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Edit Workflow</h1>
    <form action="/admin/workflows/{{ workflow.id }}/edit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ workflow.name }}" required>
        
        <label for="description">Description:</label>
        <textarea id="description" name="description">{{ workflow.description }}</textarea>
        
        <label for="process_type">Process Type:</label>
        <select id="process_type" name="process_type">
            <option value="SEQUENTIAL" {% if workflow.process_type == 'SEQUENTIAL' %}selected{% endif %}>SEQUENTIAL</option>
            <option value="PARALLEL" {% if workflow.process_type == 'PARALLEL' %}selected{% endif %}>PARALLEL</option>
        </select>
        
        <input type="submit" value="Update Workflow">
    </form>
    <br>
    <a href="/admin/workflows/{{ workflow.id }}">Back to Workflow Detail</a>
</body>
</html>
