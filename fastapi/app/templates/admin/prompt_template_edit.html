<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Prompt Template</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], textarea, select { width: 100%; padding: 5px; }
        input[type="checkbox"] { margin-right: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Edit Prompt Template</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/admin/prompt_templates/{{ prompt_template.id }}/edit" method="post">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ prompt_template.title }}" required>
        
        <label for="prompt">Prompt:</label>
        <textarea id="prompt" name="prompt" required>{{ prompt_template.prompt }}</textarea>
        
        <label>
            <input type="checkbox" name="is_complex" {% if prompt_template.is_complex %}checked{% endif %}>
            Is Complex
        </label>
        
        <label for="default_persona">Default Persona:</label>
        <select id="default_persona" name="default_persona_id" required>
            {% for persona in personas %}
            <option value="{{ persona.id }}" {% if persona.id == prompt_template.default_persona_id %}selected{% endif %}>{{ persona.role }}</option>
            {% endfor %}
        </select>
        
        <label for="categories">Categories:</label>
        <select id="categories" name="category_ids" multiple>
            {% for category in categories %}
            <option value="{{ category.id }}" {% if category in prompt_template.categories %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
        </select>
        
        <label for="tags">Tags:</label>
        <select id="tags" name="tag_ids" multiple>
            {% for tag in tags %}
            <option value="{{ tag.id }}" {% if tag in prompt_template.tags %}selected{% endif %}>{{ tag.name }}</option>
            {% endfor %}
        </select>
        
        <input type="submit" value="Update Prompt Template">
    </form>
    <a href="/admin/prompt_templates/{{ prompt_template.id }}">Back to Prompt Template Detail</a>
    <br>
    <a href="/admin/">Back to Dashboard</a>
</body>
</html>
