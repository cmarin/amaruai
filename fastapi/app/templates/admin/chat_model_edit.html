<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Chat Model</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], textarea { width: 100%; padding: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Edit Chat Model</h1>
    <form action="/admin/chat_models/{{ chat_model.id }}/edit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ chat_model.name }}" required maxlength="100">
        
        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="3" maxlength="500">{{ chat_model.description }}</textarea>
        
        <label for="api_key">API Key:</label>
        <input type="text" id="api_key" name="api_key" value="{{ chat_model.api_key }}" maxlength="200">
        
        <label for="model">Model:</label>
        <input type="text" id="model" name="model" value="{{ chat_model.model }}" required maxlength="100">
        
        <label for="provider">Provider:</label>
        <input type="text" id="provider" name="provider" value="{{ chat_model.provider }}" required maxlength="100">
        
        <label>
            <input type="checkbox" name="default" {% if chat_model.default %}checked{% endif %}>
            Default
        </label>
        
        <input type="submit" value="Update Chat Model">
    </form>
    <a href="/admin/chat_models/{{ chat_model.id }}">Back to Chat Model Detail</a>
    <br>
    <a href="/admin/chat_models">Back to Chat Models</a>
    <br>
    <a href="/admin/">Back to Dashboard</a>
</body>
</html>
