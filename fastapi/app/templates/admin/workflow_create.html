<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Workflow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], textarea, select { width: 100%; padding: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Create Workflow</h1>
    <form action="/admin/workflows/create" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        
        <label for="description">Description:</label>
        <textarea id="description" name="description"></textarea>
        
        <label for="process_type">Process Type:</label>
        <select id="process_type" name="process_type">
            <option value="SEQUENTIAL">SEQUENTIAL</option>
            <option value="PARALLEL">PARALLEL</option>
        </select>
        
        <label for="manager_chat_model_id">Manager Chat Model ID:</label>
        <input type="number" id="manager_chat_model_id" name="manager_chat_model_id">

        <label for="manager_persona_id">Manager Persona ID:</label>
        <input type="number" id="manager_persona_id" name="manager_persona_id">

        <label for="max_iterations">Max Iterations:</label>
        <input type="number" id="max_iterations" name="max_iterations">
        
        <input type="submit" value="Create Workflow">
    </form>
    <br>
    <a href="/admin/workflows">Back to Workflows</a>
</body>
</html>
