<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Detail</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        p { margin: 5px 0; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Tool Detail</h1>
    <p><strong>Name:</strong> {{ tool.name }}</p>
    <p><strong>Associated Personas:</strong></p>
    <ul>
    {% for persona in tool.personas %}
        <li>{{ persona.role }}</li>
    {% endfor %}
    </ul>
    
    <a href="/admin/tools/{{ tool.id }}/edit">Edit Tool</a>
    <br>
    <a href="/admin/tools/{{ tool.id }}/delete" onclick="return confirm('Are you sure you want to delete this tool?')">Delete Tool</a>
    <br>
    <a href="/admin/">Back to Dashboard</a>
</body>
</html>
