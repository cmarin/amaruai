<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Persona</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input[type="text"], textarea, select { width: 100%; padding: 5px; }
        input[type="checkbox"] { margin-right: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Edit Persona</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/admin/personas/{{ persona.id }}/edit" method="post">
        <label for="role">Role:</label>
        <input type="text" id="role" name="role" value="{{ persona.role }}" required>
        
        <label for="goal">Goal:</label>
        <textarea id="goal" name="goal" required>{{ persona.goal }}</textarea>
        
        <label for="backstory">Backstory:</label>
        <textarea id="backstory" name="backstory" required>{{ persona.backstory }}</textarea>
        
        <label>
            <input type="checkbox" name="allow_delegation" {% if persona.allow_delegation %}checked{% endif %}>
            Allow Delegation
        </label>
        
        <label>
            <input type="checkbox" name="verbose" {% if persona.verbose %}checked{% endif %}>
            Verbose
        </label>
        
        <label>
            <input type="checkbox" name="memory" {% if persona.memory %}checked{% endif %}>
            Memory
        </label>
        
        <label for="avatar">Avatar URL:</label>
        <input type="text" id="avatar" name="avatar" value="{{ persona.avatar or '' }}">
        
        <label>
            <input type="checkbox" name="is_favorite" {% if persona.is_favorite %}checked{% endif %}>
            Is Favorite
        </label>
        
        <label for="categories">Categories:</label>
        <select id="categories" name="category_ids" multiple>
            {% for category in categories %}
            <option value="{{ category.id }}" {% if category in persona.categories %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
        </select>
        
        <label for="tags">Tags:</label>
        <select id="tags" name="tag_ids" multiple>
            {% for tag in tags %}
            <option value="{{ tag.id }}" {% if tag in persona.tags %}selected{% endif %}>{{ tag.name }}</option>
            {% endfor %}
        </select>
        
        <input type="submit" value="Update Persona">
    </form>
    <a href="/admin/personas/{{ persona.id }}">Back to Persona Detail</a>
    <br>
    <a href="/admin/">Back to Dashboard</a>
</body>
</html>
