<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Models</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        ul { list-style-type: none; padding: 0; }
        li { margin-bottom: 10px; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Chat Models</h1>
    <ul>
        {% for chat_model in chat_models %}
        <li>
            {{ chat_model.name }} - 
            <a href="/admin/chat_models/{{ chat_model.id }}">View</a> | 
            <a href="/admin/chat_models/{{ chat_model.id }}/edit">Edit</a> | 
            <a href="/admin/chat_models/{{ chat_model.id }}/delete">Delete</a>
        </li>
        {% endfor %}
    </ul>
    <a href="/admin/chat_models/create">Create New Chat Model</a>
    <br>
    <a href="/admin/">Back to Dashboard</a>
</body>
</html>
