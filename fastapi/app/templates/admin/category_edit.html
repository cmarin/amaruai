<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Category</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        input[type="text"] { width: 100%; padding: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Edit Category</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form action="/admin/categories/{{ category.id }}/edit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ category.name }}" required>
        
        <input type="submit" value="Update Category">
    </form>
    <a href="/admin/categories/{{ category.id }}">Back to Category Detail</a>
    <br>
    <a href="/admin/">Back to Dashboard</a>
</body>
</html>
