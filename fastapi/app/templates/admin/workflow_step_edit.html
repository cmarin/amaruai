<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Workflow Step</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; }
        select { width: 100%; padding: 5px; }
        input[type="submit"] { margin-top: 20px; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Edit Workflow Step</h1>
    <form action="/admin/workflows/{{ workflow.id }}/steps/{{ step.id }}/edit" method="post">
        <label for="prompt_template_id">Prompt Template:</label>
        <select id="prompt_template_id" name="prompt_template_id" required>
            {% for template in prompt_templates %}
            <option value="{{ template.id }}" {% if template.id == step.prompt_template_id %}selected{% endif %}>{{ template.title }}</option>
            {% endfor %}
        </select>
        
        <label for="chat_model_id">Chat Model:</label>
        <select id="chat_model_id" name="chat_model_id" required>
            {% for model in chat_models %}
            <option value="{{ model.id }}" {% if model.id == step.chat_model_id %}selected{% endif %}>{{ model.name }}</option>
            {% endfor %}
        </select>
        
        <label for="persona_id">Persona:</label>
        <select id="persona_id" name="persona_id" required>
            {% for persona in personas %}
            <option value="{{ persona.id }}" {% if persona.id == step.persona_id %}selected{% endif %}>{{ persona.role }}</option>
            {% endfor %}
        </select>
        
        <input type="submit" value="Update Workflow Step">
    </form>
    <br>
    <a href="/admin/workflows/{{ workflow.id }}">Back to Workflow Detail</a>
</body>
</html>
